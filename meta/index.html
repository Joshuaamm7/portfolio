<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Analysis</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
</head>
<body>
  <header class="meta-header">
    <div class="meta-intro">
      <h1>Meta Analysis</h1>
      <p>This page includes stats about the code of this website.</p>

      <div class="slider-container">
        <label for="commit-progress">
          Show commits until:
          <input
            type="range"
            id="commit-progress"
            min="0"
            max="100"
            value="100"
          />
          <time id="commit-time"></time>
        </label>
      </div>
    </div>

    <aside class="meta-stats-panel">
      <div id="stats"></div>
    </aside>
  </header>

  <section id="scrolly-1">
    <div id="scatter-story"></div>

    <div id="scatter-plot">
      <h2>Commits by time of day</h2>
      <div id="chart"></div>
      <p id="selection-count">No commits selected</p>
      <dl id="language-breakdown" class="stats"></dl>

      <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd>
          <a href="" id="commit-link" target="_blank"></a>
        </dd>

        <dt>Date</dt>
        <dd id="commit-date"></dd>

        <dt>Time</dt>
        <dd id="commit-tooltip-time"></dd>

        <dt>Author</dt>
        <dd id="commit-author"></dd>

        <dt>Lines edited</dt>
        <dd id="commit-lines"></dd>
      </dl>
    </div>
  </section>

  <section class="files-section">
    <h2>Files by lines of code</h2>
    <dl id="files">
      <!-- Files will be generated by D3 -->
    </dl>
  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
