<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Joshua Huang</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
  <style>
    /* ── Page header ───────────────────────────────────────── */
    .contact-header {
      padding: 1rem 0 1rem;
      border-bottom: 2px solid var(--color-accent);
      margin-bottom: 2rem;
    }

    .contact-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0 0 0.4rem;
      line-height: 1.1;
    }

    .contact-sub {
      font-size: 1rem;
      line-height: 1.65;
      opacity: 0.75;
      margin: 0 0 1.1rem;
    }

    /* ── Direct contact links ──────────────────────────────── */
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .contact-link {
      display: inline-block;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--color-accent);
      text-decoration: none;
      border: 1.5px solid color-mix(in oklch, var(--color-accent), canvas 35%);
      padding: 0.28em 0.85em;
      border-radius: 2em;
      transition: background 150ms;
    }

    .contact-link:hover {
      background: color-mix(in oklch, var(--color-accent), canvas 82%);
    }

    /* ── Form card ─────────────────────────────────────────── */
    .contact-form-wrap {
      background: color-mix(in oklch, canvas, canvastext 5%);
      border-left: 3px solid var(--color-accent);
      border-radius: 0 0.5rem 0.5rem 0;
      padding: 1.5rem 1.75rem;
    }

    .form-intro {
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-accent);
      margin: 0 0 1.1rem;
    }

    /* ── Input styling ─────────────────────────────────────── */
    input,
    textarea {
      padding: 0.5em 0.75em;
      border: 1.5px solid color-mix(in oklch, currentColor 22%, transparent);
      border-radius: 0.35em;
      background: canvas;
      color: canvastext;
      width: 100%;
      transition: border-color 150ms, box-shadow 150ms;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-accent), canvas 75%);
    }

    /* ── Submit button ─────────────────────────────────────── */
    button[type="submit"] {
      background: var(--color-accent);
      color: oklch(12% 0.02 120);
      border: none;
      border-radius: 0.4em;
      padding: 0.5em 1.75em;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: auto;
      margin: 0.25em 0 0;
      justify-self: start;
      transition: background 150ms;
    }

    button[type="submit"]:hover {
      background: color-mix(in oklch, var(--color-accent), canvastext 20%);
    }
  </style>
</head>

<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="contact-header">
    <h1>Get in Touch</h1>
    <p class="contact-sub">
      I'd love to hear from you — whether it's about a project, an opportunity, or just to connect.
    </p>
    <div class="contact-links">
      <a href="mailto:joh095@ucsd.edu" class="contact-link">joh095@ucsd.edu</a>
      <a href="https://linkedin.com/in/joshuahuang22" class="contact-link" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
      <a href="https://github.com/joshuaamm7" class="contact-link" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
    </div>
  </header>

  <!-- ── Form card ───────────────────────────────────────────── -->
  <div class="contact-form-wrap">
    <p class="form-intro">Send a message</p>

    <!-- To activate: sign up at formspree.io and replace YOUR_FORM_ID below -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <label>
        Your Email:
        <input name="email" type="email" placeholder="you@example.com" required>
      </label>

      <label>
        Subject:
        <input name="subject" required>
      </label>

      <label>
        Message:
        <textarea name="body" rows="5" placeholder="Write your message…"></textarea>
      </label>

      <button type="submit">Send Message</button>

    </form>
  </div>

</body>
</html>
